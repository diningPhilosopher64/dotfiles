add_newline = true
#format = """
#[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
#[в”Ӯ](bold green)$directory$rust$package
#[в””в”Җ>](bold green) """


[line_break]
disabled = false
# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]      
format = "$symbol "                      # The name of the module we are configuring is "character"
success_symbol = "[вқҜвқҜвқҜ](bold bright-green)"  # The "success_symbol" segment is being set to "вһң" with the color "bold green"
error_symbol = "[Error in prev cmd вң—](bold bright-red)"


[aws]
disabled = true


[battery]
full_symbol = "рҹ”Ӣ "
charging_symbol = "вҡЎпёҸ "
discharging_symbol = "рҹ’Җ "
[[battery.display]]
threshold = 10
style = "bold red"


[cmd_duration]
min_time = 1000
format = "Above cmd took :  [$duration](bold yellow)"

[directory]
truncation_length = 2 
truncation_symbol = "вҖҰвҖҰ/"
truncate_to_repo=false
style = "bold yellow"
format = "\\[[$path]($style)\\] "

[docker_context]
format = "via [рҹҗӢ $context](blue bold)"

[git_branch]
symbol = "оӮ "
truncation_length = 25
truncation_symbol = "вҖҰвҖҰ"
style= "bold fg:black bg:white"
format = "On $symbol [$branch]($style) "

[git_commit]
commit_hash_length = 4
tag_symbol = "рҹ”– "



[git_status]
disabled = true
behind = "рҹҳ°"
diverged = "рҹҳө"
untracked = "рҹӨ·вҖҚ"
stashed = "рҹ“Ұ"
staged = '[++\($count\)](green)'
renamed = "рҹ‘…"

[username]
style_user = "white bold"
style_root = "red bold"
format = "[$user]($style)@"
disabled = false
show_always = true

[hostname]
ssh_only = false
format =  "[$hostname](bold white) "
trim_at = ".companyname.com"
disabled = false

[nodejs]
symbol = "пўҳ"
version_format = '$major.x'
format = "via [$symbol $version](bold green) "

[python]
symbol = "рҹҗҚ"
version_format = "$major.$minor"
#format = "[\\($virtualenv\\)](bright-yellow) $symbol [$version](bold bright-yellow)"
format = "[($symbol( $virtualenv) вһң $version)](bold bright-yellow)" #[($version)](bold bright-yellow)"



[conda]
format = " [$symbol$environment](bright-green)"
ignore_base=false

